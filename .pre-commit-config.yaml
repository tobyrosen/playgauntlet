# Cowork polyglot pre-commit config
# Source of truth: ~/Cowork/Cowork-Assets/dev-foundations-templates/pre-commit-config.yaml
# Propagated by: propagate.py
# Updated: 2026-05-22 (v2 — polyglot rebuild after fleet survey)
#
# All hooks gate on file types — a Python-only repo won't run JS hooks because
# no JS files are staged, and vice versa. This is the single root config for
# every Cowork coding repo.

default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  # ─────────────────────────────────────────────────────────────
  # Universal hygiene (every file type)
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Secrets scan (universal — blocks tokens, keys, credentials)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Markdown lint
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041, "--"]

  # Spell-check code identifiers and comments (low false positive)
  - repo: https://github.com/crate-ci/typos
    rev: v1.28.4
    hooks:
      - id: typos
        args: [--write-changes]
        # Walk the tree instead of receiving explicit paths from pre-commit.
        # typos' [files].extend-exclude in typos.toml only filters files it
        # discovers by walking — it does NOT filter paths passed explicitly.
        # With pass_filenames (the default) the data-file excludes are ignored;
        # without it, typos.toml is the single source of exclude truth.
        pass_filenames: false

  # ─────────────────────────────────────────────────────────────
  # Python
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Pyright (type checker). Each Python repo gets a [tool.pyright] section
  # in its pyproject.toml at basic mode. The hook runs ONLY on staged files
  # (pass_filenames: true) — pre-existing type debt in unchanged files won't
  # block commits. Full project type check belongs in CI, not pre-commit.
  - repo: local
    hooks:
      - id: pyright
        name: pyright (Python type check, staged files only)
        entry: pyright
        language: node
        additional_dependencies: ["pyright@1.1.410"]
        types_or: [python, pyi]

  # ─────────────────────────────────────────────────────────────
  # JS / TS / Astro / CSS / Markdown formatting
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or:
          [javascript, jsx, ts, tsx, json, css, scss, markdown, yaml, html]
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-astro@0.14.1

  # ESLint via locally-installed npx eslint (no auto-install — fail loud if missing).
  # Repos with JS/TS code need: npm install --save-dev eslint typescript-eslint eslint-config-prettier
  # And an eslint.config.mjs (the propagation script copies a shared base into JS repos).
  - repo: local
    hooks:
      - id: eslint
        name: eslint (JS/TS lint)
        entry: npx --no-install eslint --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]
        require_serial: true

  # ─────────────────────────────────────────────────────────────
  # Rust (only fires on .rs files staged — silent in non-Rust repos)
  #
  # Cargo.toml location is auto-detected so the hooks work in both layouts:
  #   - Standard Rust repo: Cargo.toml at the repo root
  #   - Tauri repo:         Cargo.toml under src-tauri/
  # The shell prefix cd's into src-tauri/ only when that's where Cargo.toml lives.
  # ─────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: bash -c 'if [ -f src-tauri/Cargo.toml ] && [ ! -f Cargo.toml ]; then cd src-tauri; fi; cargo fmt --all --check'
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: clippy
        # Warn-only by default — surfaces clippy findings without blocking commits.
        # Repos can ratchet up by changing `-- -W warnings` to `-- -D warnings` in
        # their own .pre-commit-config.yaml once their Rust baseline is clean.
        entry: bash -c 'if [ -f src-tauri/Cargo.toml ] && [ ! -f Cargo.toml ]; then cd src-tauri; fi; cargo clippy --all-targets -- -W warnings'
        language: system
        types: [rust]
        pass_filenames: false

  # ─────────────────────────────────────────────────────────────
  # Conventional commit message enforcement (commit-msg stage)
  # ─────────────────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - chore
          - docs
          - test
          - refactor
          - perf
          - ci
          - build
          - style
          - revert
